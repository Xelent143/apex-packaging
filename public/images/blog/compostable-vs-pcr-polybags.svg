<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Compostable vs PCR polybags comparison</title>
  <desc id="desc">A buyer comparison for compostable and PCR polybags across claims, storage, use case, and verification.</desc>
  <rect width="1200" height="675" fill="#eef6f6"/>
  <rect x="70" y="62" width="1060" height="551" rx="22" fill="#0f0d0a"/>
  <text x="112" y="132" fill="#f7f3ea" font-family="Arial, sans-serif" font-size="42" font-weight="700">Compostable vs PCR polybags</text>
  <text x="112" y="172" fill="#d7d1c4" font-family="Arial, sans-serif" font-size="21">The better choice depends on disposal path, shelf life, strength, and proof behind the claim.</text>
  <g transform="translate(112 232)">
    <rect width="455" height="290" rx="18" fill="#d9ead7"/>
    <text x="34" y="58" fill="#0f0d0a" font-family="Arial, sans-serif" font-size="33" font-weight="700">Compostable</text>
    <path d="M100 178c0-76 68-112 188-104-10 112-64 176-146 176-44 0-42-40-42-72z" fill="#1f9a55" stroke="#0f0d0a" stroke-width="5"/>
    <path d="M152 194c42-48 82-76 132-96" fill="none" stroke="#f7f3ea" stroke-width="8" stroke-linecap="round"/>
    <text x="34" y="265" fill="#0f0d0a" font-family="Arial, sans-serif" font-size="19">Best when the end user has a verified composting route.</text>
  </g>
  <g transform="translate(633 232)">
    <rect width="455" height="290" rx="18" fill="#f7f3ea"/>
    <text x="34" y="58" fill="#0f0d0a" font-family="Arial, sans-serif" font-size="33" font-weight="700">PCR recycled</text>
    <path d="M148 106h140l42 72-42 72H148l-42-72z" fill="#8fb8be" stroke="#0f0d0a" stroke-width="5"/>
    <path d="M178 143h82M178 178h122M178 213h78" stroke="#0f0d0a" stroke-width="9" stroke-linecap="round"/>
    <text x="34" y="265" fill="#0f0d0a" font-family="Arial, sans-serif" font-size="19">Best when recycled content and durable transport matter most.</text>
  </g>
  <text x="112" y="570" fill="#f7f3ea" font-family="Arial, sans-serif" font-size="22" font-weight="700">Apex Packaging Solutions</text>
</svg>
