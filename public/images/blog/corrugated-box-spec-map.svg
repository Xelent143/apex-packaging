<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Custom corrugated box specification map</title>
  <desc id="desc">A procurement diagram showing four decisions for custom corrugated boxes: box style, board grade, order quantity, and quote inputs.</desc>
  <rect width="1200" height="675" fill="#f7f3ea"/>
  <rect x="64" y="56" width="1072" height="563" rx="18" fill="#0f0d0a"/>
  <text x="104" y="122" fill="#f7f3ea" font-family="Arial, sans-serif" font-size="42" font-weight="700">Custom corrugated box quote map</text>
  <text x="104" y="164" fill="#d7d1c4" font-family="Arial, sans-serif" font-size="21">The four specs that decide price, lead time, and damage risk.</text>

  <g transform="translate(104 220)">
    <rect width="224" height="280" rx="14" fill="#f7f3ea"/>
    <rect x="20" y="22" width="184" height="92" rx="8" fill="#dba93a"/>
    <path d="M52 82h120v64H52z" fill="#fbf5e7" stroke="#0f0d0a" stroke-width="4"/>
    <path d="M52 82l26-28h120l-26 28z" fill="#f1dfb7" stroke="#0f0d0a" stroke-width="4"/>
    <path d="M172 82l26-28v64l-26 28z" fill="#e7c876" stroke="#0f0d0a" stroke-width="4"/>
    <text x="24" y="172" fill="#0f0d0a" font-family="Arial, sans-serif" font-size="23" font-weight="700">1. Style</text>
    <text x="24" y="207" fill="#403a31" font-family="Arial, sans-serif" font-size="17">RSC, FOL, die-cut,</text>
    <text x="24" y="232" fill="#403a31" font-family="Arial, sans-serif" font-size="17">mailer, telescoping</text>
  </g>

  <g transform="translate(358 220)">
    <rect width="224" height="280" rx="14" fill="#f7f3ea"/>
    <rect x="20" y="22" width="184" height="92" rx="8" fill="#8fb8be"/>
    <path d="M54 113c25-42 55-42 80 0s55 42 80 0" fill="none" stroke="#0f0d0a" stroke-width="9" stroke-linecap="round"/>
    <path d="M40 76h148M40 142h148" stroke="#0f0d0a" stroke-width="8" stroke-linecap="round"/>
    <text x="24" y="172" fill="#0f0d0a" font-family="Arial, sans-serif" font-size="23" font-weight="700">2. Board</text>
    <text x="24" y="207" fill="#403a31" font-family="Arial, sans-serif" font-size="17">ECT-32, ECT-44,</text>
    <text x="24" y="232" fill="#403a31" font-family="Arial, sans-serif" font-size="17">single or double wall</text>
  </g>

  <g transform="translate(612 220)">
    <rect width="224" height="280" rx="14" fill="#f7f3ea"/>
    <rect x="20" y="22" width="184" height="92" rx="8" fill="#b96f4a"/>
    <rect x="48" y="58" width="52" height="52" fill="#fbf5e7" stroke="#0f0d0a" stroke-width="4"/>
    <rect x="96" y="74" width="52" height="52" fill="#fbf5e7" stroke="#0f0d0a" stroke-width="4"/>
    <rect x="144" y="90" width="52" height="52" fill="#fbf5e7" stroke="#0f0d0a" stroke-width="4"/>
    <text x="24" y="172" fill="#0f0d0a" font-family="Arial, sans-serif" font-size="23" font-weight="700">3. Quantity</text>
    <text x="24" y="207" fill="#403a31" font-family="Arial, sans-serif" font-size="17">Prototype, 100-unit</text>
    <text x="24" y="232" fill="#403a31" font-family="Arial, sans-serif" font-size="17">stock runs, printed MOQs</text>
  </g>

  <g transform="translate(866 220)">
    <rect width="224" height="280" rx="14" fill="#f7f3ea"/>
    <rect x="20" y="22" width="184" height="92" rx="8" fill="#d9d4c9"/>
    <rect x="55" y="49" width="112" height="120" rx="6" fill="#fbf5e7" stroke="#0f0d0a" stroke-width="4"/>
    <path d="M75 80h72M75 106h72M75 132h48" stroke="#0f0d0a" stroke-width="7" stroke-linecap="round"/>
    <text x="24" y="172" fill="#0f0d0a" font-family="Arial, sans-serif" font-size="23" font-weight="700">4. RFQ inputs</text>
    <text x="24" y="207" fill="#403a31" font-family="Arial, sans-serif" font-size="17">Dimensions, weight,</text>
    <text x="24" y="232" fill="#403a31" font-family="Arial, sans-serif" font-size="17">print, freight lane</text>
  </g>

  <text x="104" y="564" fill="#f7f3ea" font-family="Arial, sans-serif" font-size="22" font-weight="700">Apex Packaging Solutions</text>
  <text x="104" y="594" fill="#d7d1c4" font-family="Arial, sans-serif" font-size="18">Canadian custom packaging: corrugated boxes, mailers, polybags, industrial bulk, and protective packaging.</text>
</svg>
