<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Heavy product shipping box decision map</title>
  <desc id="desc">A technical diagram showing four checkpoints for custom shipping boxes for heavy products: packed weight, board grade, flute and wall construction, and pallet stacking conditions.</desc>
  <rect width="1200" height="720" fill="#F7F5F1"/>
  <rect x="40" y="40" width="1120" height="640" rx="28" fill="#FFFDF8" stroke="#D8D0C2" stroke-width="2"/>
  <text x="80" y="118" fill="#0F0D0A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">APEX PACKAGING SOLUTIONS</text>
  <text x="80" y="172" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="42" font-weight="700">Custom Shipping Boxes for Heavy Products</text>
  <text x="80" y="212" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="42" font-weight="700">ECT, Flute, and Pallet Stacking Map</text>
  <text x="80" y="258" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="22">Start with the packed load, then check compression, handling, and stacking before you lock the board.</text>

  <rect x="80" y="320" width="240" height="240" rx="24" fill="#FFF4EA" stroke="#D34A1A" stroke-width="3"/>
  <text x="108" y="372" fill="#D34A1A" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">CHECKPOINT 01</text>
  <text x="108" y="420" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">Check packed</text>
  <text x="108" y="454" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">weight first</text>
  <text x="108" y="494" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">35 lb and under: ECT-32</text>
  <text x="108" y="522" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">35-65 lb: ECT-44</text>
  <text x="108" y="550" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">65 lb plus: double-wall review</text>

  <rect x="340" y="320" width="240" height="240" rx="24" fill="#FFF9F1" stroke="#BDA77D" stroke-width="3"/>
  <text x="368" y="372" fill="#8A6A2D" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">CHECKPOINT 02</text>
  <text x="368" y="420" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">Match board</text>
  <text x="368" y="454" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">to compression</text>
  <text x="368" y="494" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Warehouse dwell time</text>
  <text x="368" y="522" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Top-load on pallet</text>
  <text x="368" y="550" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Humidity and transit time</text>

  <rect x="600" y="320" width="240" height="240" rx="24" fill="#F4F7F1" stroke="#1B3A2F" stroke-width="3"/>
  <text x="628" y="372" fill="#1B3A2F" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">CHECKPOINT 03</text>
  <text x="628" y="420" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">Choose flute</text>
  <text x="628" y="454" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">and wall build</text>
  <text x="628" y="494" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">C flute: general freight</text>
  <text x="628" y="522" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">BC: heavier industrial loads</text>
  <text x="628" y="550" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Add inserts before overspec board</text>

  <rect x="860" y="320" width="240" height="240" rx="24" fill="#F6F3ED" stroke="#70655A" stroke-width="3"/>
  <text x="888" y="372" fill="#4C443C" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">CHECKPOINT 04</text>
  <text x="888" y="420" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">Confirm pallet</text>
  <text x="888" y="454" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">stacking pattern</text>
  <text x="888" y="494" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Column vs interlock</text>
  <text x="888" y="522" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Wrap tension + edge boards</text>
  <text x="888" y="550" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Ship sample before rollout</text>

  <path d="M320 440H340" stroke="#D34A1A" stroke-width="4" stroke-linecap="round"/>
  <path d="M580 440H600" stroke="#BDA77D" stroke-width="4" stroke-linecap="round"/>
  <path d="M840 440H860" stroke="#1B3A2F" stroke-width="4" stroke-linecap="round"/>
  <circle cx="330" cy="440" r="6" fill="#D34A1A"/>
  <circle cx="590" cy="440" r="6" fill="#BDA77D"/>
  <circle cx="850" cy="440" r="6" fill="#1B3A2F"/>

  <rect x="80" y="598" width="1020" height="42" rx="21" fill="#0F0D0A"/>
  <text x="600" y="625" text-anchor="middle" fill="#F7F5F1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Heavy-product cartons fail when load, pallet pattern, and dwell time are guessed instead of specified in the RFQ.</text>
</svg>
