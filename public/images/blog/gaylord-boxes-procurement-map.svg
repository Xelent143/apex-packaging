<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gaylord boxes procurement map</title>
  <desc id="desc">A technical decision diagram showing six procurement checkpoints for Gaylord boxes and bulk containers: footprint, shape, liner, stacking, release pattern, and discharge method.</desc>
  <rect width="1200" height="720" fill="#F7F5F1"/>
  <rect x="40" y="40" width="1120" height="640" rx="28" fill="#FFFDF8" stroke="#D8D0C2" stroke-width="2"/>
  <text x="80" y="118" fill="#0F0D0A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2">APEX PACKAGING SOLUTIONS</text>
  <text x="80" y="170" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="40" font-weight="700">Gaylord Boxes And Bulk Containers</text>
  <text x="80" y="210" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="40" font-weight="700">Procurement Quote Map</text>
  <text x="80" y="254" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="22">Quote the plant workflow, not only the outside dimensions.</text>

  <rect x="80" y="314" width="310" height="118" rx="24" fill="#FFF4EA" stroke="#D34A1A" stroke-width="3"/>
  <text x="108" y="356" fill="#D34A1A" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">01 FOOTPRINT</text>
  <text x="108" y="392" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="27" font-weight="700">40x48x36 or 48x40x42?</text>
  <text x="108" y="418" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Start with pallet footprint and usable cube.</text>

  <rect x="430" y="314" width="310" height="118" rx="24" fill="#FFF9F1" stroke="#BDA77D" stroke-width="3"/>
  <text x="458" y="356" fill="#8A6A2D" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">02 SHAPE</text>
  <text x="458" y="392" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="27" font-weight="700">Square or octagonal?</text>
  <text x="458" y="418" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Match the container to product flow and discharge.</text>

  <rect x="780" y="314" width="310" height="118" rx="24" fill="#F4F7F1" stroke="#1B3A2F" stroke-width="3"/>
  <text x="808" y="356" fill="#1B3A2F" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">03 LINER</text>
  <text x="808" y="392" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="27" font-weight="700">Barrier or food contact?</text>
  <text x="808" y="418" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Quote the liner with the corrugated shell.</text>

  <rect x="80" y="470" width="310" height="118" rx="24" fill="#F6F3ED" stroke="#70655A" stroke-width="3"/>
  <text x="108" y="512" fill="#4C443C" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">04 STACKING</text>
  <text x="108" y="548" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="27" font-weight="700">One-high or stored stacked?</text>
  <text x="108" y="574" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Top-load and dwell time change the build.</text>

  <rect x="430" y="470" width="310" height="118" rx="24" fill="#FFF4EA" stroke="#D34A1A" stroke-width="3"/>
  <text x="458" y="512" fill="#D34A1A" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">05 RELEASES</text>
  <text x="458" y="548" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="27" font-weight="700">One shipment or blanket PO?</text>
  <text x="458" y="574" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">Inventory planning affects the spec and timing.</text>

  <rect x="780" y="470" width="310" height="118" rx="24" fill="#FFF9F1" stroke="#BDA77D" stroke-width="3"/>
  <text x="808" y="512" fill="#8A6A2D" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700">06 DISCHARGE</text>
  <text x="808" y="548" fill="#0F0D0A" font-family="Archivo, Arial, sans-serif" font-size="27" font-weight="700">Dump, cut, or lift-out?</text>
  <text x="808" y="574" fill="#5F5A52" font-family="Inter, Arial, sans-serif" font-size="18">The unload method decides shape and closure details.</text>

  <path d="M390 373H430" stroke="#D34A1A" stroke-width="4" stroke-linecap="round"/>
  <path d="M740 373H780" stroke="#BDA77D" stroke-width="4" stroke-linecap="round"/>
  <path d="M390 529H430" stroke="#70655A" stroke-width="4" stroke-linecap="round"/>
  <path d="M740 529H780" stroke="#D34A1A" stroke-width="4" stroke-linecap="round"/>
  <circle cx="410" cy="373" r="7" fill="#D34A1A"/>
  <circle cx="760" cy="373" r="7" fill="#BDA77D"/>
  <circle cx="410" cy="529" r="7" fill="#70655A"/>
  <circle cx="760" cy="529" r="7" fill="#D34A1A"/>

  <rect x="80" y="620" width="1010" height="38" rx="19" fill="#0F0D0A"/>
  <text x="585" y="645" text-anchor="middle" fill="#F7F5F1" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Bulk-container pricing gets cleaner when the RFQ includes handling, lining, stacking, and release details from day one.</text>
</svg>
