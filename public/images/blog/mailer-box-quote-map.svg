<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Custom mailer box quote map</title>
  <desc id="desc">A technical diagram showing four decision areas for custom ecommerce mailer boxes: structure and board, print coverage, insert choice, and MOQ and RFQ readiness.</desc>
  <rect width="1200" height="720" fill="#F7F5F1"/>
  <rect x="32" y="32" width="1136" height="656" rx="28" fill="#FFFDF8" stroke="#D9D2C3" stroke-width="2"/>
  <rect x="68" y="64" width="1064" height="116" rx="22" fill="#0F0D0A"/>
  <text x="104" y="112" fill="#F7F5F1" font-family="Archivo, Arial, sans-serif" font-size="42" font-weight="700">Custom mailer box quote map</text>
  <text x="104" y="152" fill="#DDD5C8" font-family="Inter, Arial, sans-serif" font-size="22">Four decisions decide most ecommerce mailer cost, fit, and production timing.</text>

  <rect x="84" y="220" width="236" height="192" rx="24" fill="#FFF8EA" stroke="#D34A1A" stroke-width="3"/>
  <text x="108" y="266" fill="#D34A1A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">1. Structure</text>
  <text x="108" y="304" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">E-flute = clean print</text>
  <text x="108" y="334" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">B-flute = more rigidity</text>
  <text x="108" y="364" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Kraft = warm finish</text>
  <text x="108" y="394" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">White = higher contrast</text>

  <rect x="344" y="220" width="236" height="192" rx="24" fill="#FFF8EA" stroke="#D34A1A" stroke-width="3"/>
  <text x="368" y="266" fill="#D34A1A" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">2. Print</text>
  <text x="368" y="304" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Outside only = lean setup</text>
  <text x="368" y="334" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Inside print = stronger unboxing</text>
  <text x="368" y="364" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Heavy coverage = more proofing</text>
  <text x="368" y="394" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Barcode copy must be locked</text>

  <rect x="604" y="220" width="236" height="192" rx="24" fill="#EEF4EE" stroke="#1B3A2F" stroke-width="3"/>
  <text x="628" y="266" fill="#1B3A2F" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">3. Insert</text>
  <text x="628" y="304" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Corrugated = recyclable</text>
  <text x="628" y="334" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Divider = flat kits</text>
  <text x="628" y="364" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Foam = fragile retention</text>
  <text x="628" y="394" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Void fill = fastest quote</text>

  <rect x="864" y="220" width="252" height="192" rx="24" fill="#EEF4EE" stroke="#1B3A2F" stroke-width="3"/>
  <text x="888" y="266" fill="#1B3A2F" font-family="Archivo, Arial, sans-serif" font-size="28" font-weight="700">4. MOQ + RFQ</text>
  <text x="888" y="304" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">250-500 = typical start</text>
  <text x="888" y="334" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">More custom = higher floor</text>
  <text x="888" y="364" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Packed dims beat raw dims</text>
  <text x="888" y="394" fill="#0F0D0A" font-family="JetBrains Mono, monospace" font-size="21">Postal code locks freight</text>

  <path d="M202 432V492H990V432" stroke="#B8AF9E" stroke-width="4" stroke-linecap="round"/>
  <path d="M202 492H990" stroke="#B8AF9E" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 10"/>
  <circle cx="202" cy="492" r="10" fill="#D34A1A"/>
  <circle cx="462" cy="492" r="10" fill="#D34A1A"/>
  <circle cx="722" cy="492" r="10" fill="#1B3A2F"/>
  <circle cx="990" cy="492" r="10" fill="#1B3A2F"/>

  <rect x="100" y="534" width="1000" height="110" rx="24" fill="#0F0D0A"/>
  <text x="132" y="578" fill="#F7F5F1" font-family="Archivo, Arial, sans-serif" font-size="30" font-weight="700">Quote faster when the RFQ includes:</text>
  <text x="132" y="616" fill="#DDD5C8" font-family="Inter, Arial, sans-serif" font-size="23">packed dimensions • first-run quantity • print scope • insert need • in-hand date</text>
</svg>
