name: Daily blog publisher

on:
  schedule:
    # 09:00 UTC is 2:00 PM Pakistan time.
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish queued blog post
        run: node scripts/publish-daily-blog.mjs

      - name: Validate site
        run: |
          npm run lint:slop
          npm run build

      - name: Commit and push if a post was published
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No blog changes to publish."
            exit 0
          fi
          git config user.name "Apex Blog Publisher"
          git config user.email "actions@github.com"
          git add src/pages/blog public/images/blog
          git commit -m "Publish scheduled daily blog"
          git push
